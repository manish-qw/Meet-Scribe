version: "3.9"

# Dev override — run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload
    volumes:
      - ./secrets/firebase-service-account.json:/run/secrets/firebase.json:ro
      - ./backend/app:/app/app  # hot-reload backend code

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src  # hot-reload frontend code
    environment:
      - CHOKIDAR_USEPOLLING=true
